<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="100%" height="100%" class="endstate-logo">
  <defs>
    <radialGradient id="ambientAura" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0.08)"/>
      <stop offset="50%" stop-color="rgba(176, 38, 255, 0.03)"/>
      <stop offset="100%" stop-color="rgba(10, 11, 16, 0)"/>
    </radialGradient>

    <linearGradient id="journeyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#B026FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="160" height="120" fill="transparent"/>
  <circle cx="80" cy="43" r="60" fill="url(#ambientAura)"/>

  <line x1="45" y1="23" x2="45" y2="63" stroke="#00E5FF" stroke-width="3.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <circle cx="45" cy="23" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>
  <circle cx="45" cy="43" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>
  <circle cx="45" cy="63" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>

  <path d="M 48 23 L 60 23 C 85 23, 95 43, 115 43" fill="none" stroke="url(#journeyGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 48 63 L 60 63 C 85 63, 95 43, 115 43" fill="none" stroke="url(#journeyGrad)" stroke-width="2" stroke-linecap="round"/>

  <line x1="48" y1="43" x2="55" y2="43" stroke="#00E5FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M 80 43 C 88 27, 105 27, 105 43 C 105 59, 88 59, 80 43 C 72 27, 55 27, 55 43 C 55 59, 72 59, 80 43 Z" 
        fill="none" stroke="rgba(176, 38, 255, 0.2)" stroke-width="2.5"/>
  <path class="agent-loop-animated" d="M 80 43 C 88 27, 105 27, 105 43 C 105 59, 88 59, 80 43 C 72 27, 55 27, 55 43 C 55 59, 72 59, 80 43 Z" 
        fill="none" stroke="#B026FF" stroke-width="2.5" stroke-dasharray="6 4" filter="url(#neonGlow)"/>
  <line x1="105" y1="43" x2="112" y2="43" stroke="#00FFA3" stroke-width="2" stroke-linecap="round"/>

  <polygon points="115,36 122,43 115,50 108,43" fill="#00FFA3" filter="url(#emeraldGlow)"/>
  <polygon points="115,39 119,43 115,47 111,43" fill="#F8FAFC"/>

  <text x="80" y="86" font-family="'Inter', -apple-system, sans-serif" font-size="6.5" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="3.5">
    FROM VISION TO
  </text>
  <text x="80" y="104" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="4">
    <tspan fill="#F8FAFC">END</tspan><tspan fill="#00E5FF">STATE</tspan>
  </text>
</svg>