<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" class="endstate-logomark">
  <defs>
    <radialGradient id="ambientAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0.08)"/>
      <stop offset="50%" stop-color="rgba(176, 38, 255, 0.03)"/>
      <stop offset="100%" stop-color="rgba(10, 11, 16, 0)"/>
    </radialGradient>

    <linearGradient id="journeyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#B026FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" fill="transparent"/>
  <circle cx="60" cy="60" r="60" fill="url(#ambientAura)"/>

  <line x1="25" y1="40" x2="25" y2="80" stroke="#00E5FF" stroke-width="3.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <circle cx="25" cy="40" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>
  <circle cx="25" cy="60" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>
  <circle cx="25" cy="80" r="3" fill="#14151F" stroke="#00E5FF" stroke-width="2"/>

  <path d="M 28 40 L 40 40 C 65 40, 75 60, 95 60" fill="none" stroke="url(#journeyGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 28 80 L 40 80 C 65 80, 75 60, 95 60" fill="none" stroke="url(#journeyGrad)" stroke-width="2" stroke-linecap="round"/>

  <line x1="28" y1="60" x2="35" y2="60" stroke="#00E5FF" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M 60 60 C 68 44, 85 44, 85 60 C 85 76, 68 76, 60 60 C 52 44, 35 44, 35 60 C 35 76, 52 76, 60 60 Z" 
        fill="none" stroke="rgba(176, 38, 255, 0.2)" stroke-width="2.5"/>
        
  <path class="agent-loop-animated" d="M 60 60 C 68 44, 85 44, 85 60 C 85 76, 68 76, 60 60 C 52 44, 35 44, 35 60 C 35 76, 52 76, 60 60 Z" 
        fill="none" stroke="#B026FF" stroke-width="2.5" stroke-dasharray="6 4" filter="url(#neonGlow)"/>
        
  <line x1="85" y1="60" x2="92" y2="60" stroke="#00FFA3" stroke-width="2" stroke-linecap="round"/>

  <polygon points="95,53 102,60 95,67 88,60" fill="#00FFA3" filter="url(#emeraldGlow)"/>
  <polygon points="95,56 99,60 95,64 91,60" fill="#F8FAFC"/>

</svg>